<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Gen — Map Generator</title>
  <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="/nav.css">
  <script src="/jquery/jquery.min.js"></script>
  <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
  <style>
    .page.gen { overflow: auto; }

    .control label .val {
      color: var(--bs-primary);
      font-variant-numeric: tabular-nums;
    }

    #map-canvas {
      image-rendering: pixelated;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      width: 100%;
      max-width: 640px;
      aspect-ratio: 1 / 1;
      background: #0d0d0d;
    }

    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      font-size: 12px;
      color: #b0b0b0;
      max-width: 640px;
    }
    #legend .item { display: flex; align-items: center; gap: 5px; }
    #legend .swatch { width: 13px; height: 13px; border-radius: 3px; border: 1px solid #00000055; }
  </style>
</head>
<body>
  <main class="page gen">
    <div class="container-fluid py-3">
      <div class="row g-4">
        <!-- Controls: full width on phones, sidebar from large screens up -->
        <div class="col-12 col-lg-4 col-xl-3" id="panel">
          <h1 class="h5 mb-3">Map Generator</h1>

          <div class="control mb-3">
            <label for="seed" class="form-label small text-secondary">Seed</label>
            <div class="input-group input-group-sm">
              <input type="number" id="seed" class="form-control" value="1337">
              <button class="btn btn-outline-secondary" id="randomize" title="Randomize seed">🎲</button>
            </div>
          </div>

          <div class="control mb-3">
            <label for="gridSize" class="form-label small text-secondary d-flex justify-content-between">
              <span>Resolution</span><span class="val" id="gridSize-val"></span>
            </label>
            <input type="range" id="gridSize" class="form-range" min="32" max="160" step="8" value="96">
          </div>

          <div class="control mb-3">
            <label for="frequency" class="form-label small text-secondary d-flex justify-content-between">
              <span>Frequency</span><span class="val" id="frequency-val"></span>
            </label>
            <input type="range" id="frequency" class="form-range" min="0.01" max="0.15" step="0.005" value="0.045">
          </div>

          <div class="control mb-3">
            <label for="octaves" class="form-label small text-secondary d-flex justify-content-between">
              <span>Octaves</span><span class="val" id="octaves-val"></span>
            </label>
            <input type="range" id="octaves" class="form-range" min="1" max="8" step="1" value="5">
          </div>

          <div class="control mb-3">
            <label for="persistence" class="form-label small text-secondary d-flex justify-content-between">
              <span>Persistence</span><span class="val" id="persistence-val"></span>
            </label>
            <input type="range" id="persistence" class="form-range" min="0.2" max="0.8" step="0.05" value="0.5">
          </div>

          <div class="control mb-3">
            <label for="lacunarity" class="form-label small text-secondary d-flex justify-content-between">
              <span>Lacunarity</span><span class="val" id="lacunarity-val"></span>
            </label>
            <input type="range" id="lacunarity" class="form-range" min="1.5" max="3.5" step="0.1" value="2.0">
          </div>

          <hr>

          <div class="control mb-3">
            <label for="waterLevel" class="form-label small text-secondary d-flex justify-content-between">
              <span>Water level</span><span class="val" id="waterLevel-val"></span>
            </label>
            <input type="range" id="waterLevel" class="form-range" min="0.1" max="0.7" step="0.01" value="0.38">
          </div>

          <div class="control mb-3 form-check form-switch">
            <input type="checkbox" id="island" class="form-check-input" checked>
            <label for="island" class="form-check-label small text-secondary">Island falloff</label>
          </div>

          <div class="control mb-3">
            <label for="islandStrength" class="form-label small text-secondary d-flex justify-content-between">
              <span>Falloff strength</span><span class="val" id="islandStrength-val"></span>
            </label>
            <input type="range" id="islandStrength" class="form-range" min="0" max="2" step="0.1" value="1.0">
          </div>

          <hr>

          <div class="d-grid gap-2">
            <button class="btn btn-primary d-none" id="generate">Generate</button>
            <button class="btn btn-secondary" id="export">Export GeoJSON</button>
          </div>
        </div>

        <!-- Stage: canvas + legend -->
        <div class="col-12 col-lg-8 col-xl-9 d-flex flex-column align-items-center gap-3" id="stage">
          <canvas id="map-canvas"></canvas>
          <div id="legend"></div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/nav.js"></script>
  <script type="module" src="/generate.js"></script>
</body>
</html>
