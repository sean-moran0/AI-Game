<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Game — Chat</title>
  <link rel="stylesheet" href="/nav.css">
  <style>
    .page.chat { display: flex; flex-direction: column; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 720px;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #2f6fd8;
      color: #fff;
    }

    .message.assistant {
      align-self: flex-start;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
    }

    .message.error {
      align-self: flex-start;
      background: #4a1a1a;
      border: 1px solid #7a2a2a;
      color: #f08080;
    }

    #input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #2a2a2a;
      background: #1a1a1a;
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #3a3a3a;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 15px;
      resize: none;
      line-height: 1.4;
      max-height: 140px;
      overflow-y: auto;
      font-family: inherit;
    }

    #input:focus { outline: none; border-color: #2f6fd8; }

    #send {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #2f6fd8;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      align-self: flex-end;
    }

    #send:disabled { opacity: 0.4; cursor: not-allowed; }
    #send:not(:disabled):hover { background: #3a7fe8; }
  </style>
</head>
<body>
  <script src="/nav.js"></script>
  <main class="page chat">
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="input" rows="1" placeholder="Type a message…"></textarea>
      <button id="send">Send</button>
    </div>
  </main>
  <script src="/index.js"></script>
</body>
</html>
