<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Gen — Chat</title>
  <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="/nav.css">
  <script src="/jquery/jquery.min.js"></script>
  <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
  <style>
    .page.chat { display: flex; flex-direction: column; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: min(720px, 90%);
      width: fit-content;
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--bs-primary);
      color: #fff;
    }

    .message.assistant {
      align-self: flex-start;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
    }

    .message.error {
      align-self: flex-start;
      background: #4a1a1a;
      border: 1px solid #7a2a2a;
      color: #f08080;
    }

    #input {
      resize: none;
      max-height: 140px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <main class="page chat">
    <div id="messages"></div>
    <div id="input-area" class="d-flex gap-2 p-3 border-top">
      <textarea id="input" class="form-control" rows="1" placeholder="Type a message…"></textarea>
      <button id="send" class="btn btn-primary align-self-end">Send</button>
    </div>
  </main>

  <script type="module" src="/nav.js"></script>
  <script type="module" src="/index.js"></script>
</body>
</html>
